<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Web Dev Lab Project</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <h1 class="main-title">User Directory</h1>

    <!-- 1. Fetch User Cards Project -->
    <button onclick="loadUsers()">Load All Users (Fetch)</button>
    <p id="status">Click the button to synchronize data.</p>
    <div class="grid" id="userGrid"></div>

    <!-- 2. Classic AJAX / jQuery Get Section -->
    <div class="ajax-container">
        <button id="loadBtn">Classic AJAX (XHR)</button>
        <button id="jqLoadBtn">Shorthand GET (jQuery)</button>
        <div id="result">Interaction output appears here...</div>
        <button id="toggleBtn">Show/Hide Grid (Slide Effect)</button>
    </div>

    <!-- 3. Live Search Module -->
    <hr>
    <div class="ajax-container">
        <h2>Live Index Search</h2>
        <input type="text" id="searchBox" placeholder="Start typing a name..." 
               style="width: 80%; padding: 12px; border-radius: 6px; border: 1px solid #ccc;">
        <p id="searchStatus"></p>
        <div id="searchResults" class="grid"></div>
    </div>


    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
