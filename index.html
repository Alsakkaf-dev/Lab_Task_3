<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Web Development Portfolio Lab</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <h1 class="main-title">Interactive Development Lab</h1>

    <!-- 1. JSON and Basic Grid -->
    <button onclick="loadUsers()">Synchronize User Records</button>
    <p id="status">System idle.</p>
    <div class="grid" id="userGrid"></div>

    <!-- 2. jQuery Shorthand and Classic Methods -->
    <div class="ajax-container">
      <button id="jqLoadBtn">Query User #3 (Shorthand)</button>
      <button id="loadBtn">Classic Request (Legacy XHR)</button>
      <div id="result">Waiting for input...</div>
      <button id="toggleBtn">Show Viewport</button>
    </div>

    <!-- 3. Real-time Search Module -->
    <hr>
    <div class="ajax-container">
      <h3>Internal Registry Search</h3>
      <input type="text" id="searchBox" placeholder="Search index by name...">
      <p id="searchStatus"></p>
      <div id="searchResults" class="grid"></div>
    </div>

    <!-- 4. Final Project: Country Explorer (Section 5) -->
    <hr>
    <div class="ajax-container">
        <h3>Global Country Explorer</h3>
        <input type="text" id="countryInput" placeholder="Enter country name (e.g. Malaysia)...">
        <button id="searchBtn">Retrieve Information</button>
        <p id="error" style="color:red;"></p>
        <div id="card" style="display:none; padding:20px; border:1px solid #ccc; background:#fff; border-radius:8px;">
            <h2 id="countryName"></h2>
            <img id="flag" src="" alt="Flag" style="width: 150px; border: 1px solid #ddd;">
            <div id="info"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
